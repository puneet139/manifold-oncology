<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#6e1b1b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Mesh lines (triangulated manifold surface) -->
  <g stroke="rgba(255,255,255,0.45)" stroke-width="2" stroke-linecap="round" fill="none">
    <!-- M outline -->
    <line x1="17" y1="76" x2="34" y2="26"/>
    <line x1="34" y1="26" x2="50" y2="54"/>
    <line x1="50" y1="54" x2="66" y2="26"/>
    <line x1="66" y1="26" x2="83" y2="76"/>
    <!-- Cross-mesh connections (triangulation) -->
    <line x1="17" y1="76" x2="50" y2="54"/>
    <line x1="50" y1="54" x2="83" y2="76"/>
    <line x1="34" y1="26" x2="66" y2="26"/>
  </g>

  <!-- Nodes -->
  <g filter="url(#glow)">
    <circle cx="17" cy="76" r="4"   fill="white" opacity="0.85"/>
    <circle cx="34" cy="26" r="4.5" fill="white" opacity="0.9"/>
    <circle cx="50" cy="54" r="5.5" fill="white"/>
    <circle cx="66" cy="26" r="4.5" fill="white" opacity="0.9"/>
    <circle cx="83" cy="76" r="4"   fill="white" opacity="0.85"/>
  </g>
</svg>
